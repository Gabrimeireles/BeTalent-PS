services:
  mysql:
    image: mysql:8.4
    container_name: be-talent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-app}
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${DB_PASSWORD:-root}']
      interval: 10s
      timeout: 5s
      retries: 20

  gateways-mock:
    image: matheusprotzen/gateways-mock
    container_name: be-talent-gateways-mock
    restart: unless-stopped
    ports:
      - '3001:3001'
      - '3002:3002'

  app:
    build: .
    container_name: be-talent-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      gateways-mock:
        condition: service_started
    environment:
      TZ: UTC
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      APP_KEY: 3gAn6P1n8xQ7bVc4mR2kL9tY5uHsJ0cD
      APP_URL: http://localhost:3333
      SESSION_DRIVER: cookie
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_DATABASE: ${DB_DATABASE:-app}
      GATEWAY_MOCK_HOST: gateways-mock
      GATEWAY1_PORT: 3001
      GATEWAY2_PORT: 3002
    ports:
      - '3333:3333'
    command: >
      sh -c "node ace migration:run --force &&
             node ace db:seed &&
             node ace serve"

volumes:
  mysql_data:
