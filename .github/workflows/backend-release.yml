name: Backend - Create Release

on:
  workflow_run:
    workflows: ["Backend - Update Swagger Docs"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ secrets.HOMOLOG_VERSION }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  create-release:
    name: Create Tag & Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate release version
        run: |
          if [ -z "${{ env.RELEASE_VERSION }}" ]; then
            echo "HOMOLOG_VERSION is empty. Set the secret before releasing."
            exit 1
          fi

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ env.RELEASE_VERSION }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists. Skipping tag/release creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG is available"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists != 'true'
        run: |
          TAG="v${{ env.RELEASE_VERSION }}"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "Tag created and pushed: $TAG"

      - name: Create GitHub Release
        id: create_release
        if: steps.check_tag.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `v${{ env.RELEASE_VERSION }}`;

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });

            core.setOutput('release_url', release.data.html_url);
            core.setOutput('release_id', release.data.id);

            return release.data;

      - name: Update version in secrets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ env.RELEASE_VERSION }}';

            // Note: This requires a PAT with repo scope
            // GITHUB_TOKEN doesn't have permission to update secrets

            console.log(`To update secrets, run:`);
            console.log(`gh secret set HOMOLOG_VERSION --body "${version}"`);
            console.log(`gh secret set PROD_VERSION --body "${version}"`);

      - name: Create summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Release Created Successfully

          **Version:** v${{ env.RELEASE_VERSION }}
          **Release Notes:** Generated automatically by GitHub
          **Tag Exists:** ${{ steps.check_tag.outputs.exists }}

          ### Links

          - [View Release](${{ steps.create_release.outputs.release_url }})
          - [View Tag](https://github.com/${{ github.repository }}/releases/tag/v${{ env.RELEASE_VERSION }})

          ### Next Steps

          1. Update version secrets:
             ```bash
             gh secret set HOMOLOG_VERSION --body "${{ env.RELEASE_VERSION }}"
             gh secret set PROD_VERSION --body "${{ env.RELEASE_VERSION }}"
             ```

          2. Deploy to production if ready

          3. Announce the release to your team
          EOF

      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: "success"
          title: "New Release: v${{ env.RELEASE_VERSION }}"
          description: |
            **Version:** v${{ env.RELEASE_VERSION }}

            [View Release](${{ steps.create_release.outputs.release_url }})
          color: 3066993
          username: "Release Bot"
