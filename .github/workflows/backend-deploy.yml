name: Backend - Deploy to Homologation

on:
  workflow_run:
    workflows: ["Backend - Create Release"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_health_check:
        description: "Skip health check"
        required: false
        type: boolean
        default: false

permissions: {}

env:
  DEPLOY_ENVIRONMENT: homologation
  RELEASE_VERSION: ${{ secrets.HOMOLOG_VERSION }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  HEALTH_URL: ${{ secrets.HEALTH_URL }}
  HEALTH_CHECK_RETRIES: 10
  HEALTH_CHECK_INTERVAL: 30
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') }}

    outputs:
      deployment-time: ${{ steps.deploy-info.outputs.time }}

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:dev-ci
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Create backup of current deployment
        id: backup
        run: |
          BACKUP_ID=$(date +%Y%m%d_%H%M%S)
          echo "backup-id=$BACKUP_ID" >> $GITHUB_OUTPUT

          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "BACKUP_ID=$BACKUP_ID bash -s" << 'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            mkdir -p backups

            if [ -f "${{ env.COMPOSE_FILE }}" ]; then
              cp "${{ env.COMPOSE_FILE }}" "backups/${{ env.COMPOSE_FILE }}.$BACKUP_ID"
            fi

            if [ -f .env.backend ]; then
              cp .env.backend backups/.env.backend.$BACKUP_ID
            fi

            if [ -f .env ]; then
              cp .env backups/.env.$BACKUP_ID
            fi

            if [ -f .env ]; then
              docker compose --env-file .env -f "${{ env.COMPOSE_FILE }}" ps -q app > backups/container.$BACKUP_ID.id || true
            else
              docker compose -f "${{ env.COMPOSE_FILE }}" ps -q app > backups/container.$BACKUP_ID.id || true
            fi

            echo "Backup created: $BACKUP_ID"
          EOF
        env:
          BACKUP_ID: ${{ steps.backup.outputs.backup-id }}

      - name: Deploy to server
        id: deploy-info
        run: |
          DEPLOY_START=$(date +%s)

          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} <<-'ENDSSH'
          	set -e
          	cd ${{ secrets.DEPLOY_PATH }}

          	echo "Logging into GitHub Container Registry..."
          	echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          	echo "Creating backend environment file from repo values..."
          	cat > .env.backend <<-'ENVFILE'
          	TZ=UTC
          	NODE_ENV=production
          	HOST=0.0.0.0
          	PORT=3333
          	LOG_LEVEL=info
          	APP_KEY=${{ secrets.APP_KEY }}
          	APP_URL=${{ secrets.APP_URL }}
          	SESSION_DRIVER=cookie
          	DB_HOST=${{ secrets.DB_HOST }}
          	DB_PORT=${{ secrets.DB_PORT }}
          	DB_USER=${{ secrets.DB_USER }}
          	DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          	DB_DATABASE=${{ secrets.DB_DATABASE }}
          	GATEWAY_MOCK_HOST=gateways-mock
          	GATEWAY1_PORT=3001
          	GATEWAY2_PORT=3002
          	GATEWAY1_BASE_URL=http://gateways-mock:3001
          	GATEWAY2_BASE_URL=http://gateways-mock:3002
          	VERSION=${{ secrets.HOMOLOG_VERSION }}
          	BUILD_SHA=${{ github.event.workflow_run.head_sha || github.sha }}
          	ENVFILE
          	echo "DEPLOY_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> .env.backend
          	chmod 600 .env.backend

          	echo "Preparing compose env..."
          	set -a
          	if [ -f .env ]; then . ./.env; fi
          	set +a
          	: "${APP_IMAGE:=}"
          	: "${APP_TAG:=}"
          	OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          	APP_IMAGE=ghcr.io/${OWNER_LOWER}/be-talent-ps
          	APP_TAG=v${{ env.RELEASE_VERSION }}
          	# Upsert compose vars without duplicating keys
          	if [ -f .env ]; then
          	  grep -vE '^(APP_IMAGE|APP_TAG)=' .env > .env.tmp || true
          	else
          	  : > .env.tmp
          	fi
          	cat >> .env.tmp <<COMPOSE
          	APP_IMAGE=$APP_IMAGE
          	APP_TAG=$APP_TAG
          	COMPOSE
          	mv .env.tmp .env

          	echo "Pulling backend image..."
          	docker compose --env-file .env -f "${{ env.COMPOSE_FILE }}" pull app

          	echo "Starting new backend container..."
          	docker compose --env-file .env -f "${{ env.COMPOSE_FILE }}" up -d --no-deps --force-recreate app

          	echo "Waiting for container to be ready..."
          	sleep 10

          	echo "Cleaning up old images..."
          	docker image prune -f

           	echo "Deployment completed successfully"
          ENDSSH

          DEPLOY_END=$(date +%s)
          DEPLOY_DURATION=$((DEPLOY_END - DEPLOY_START))

          echo "time=$DEPLOY_DURATION" >> $GITHUB_OUTPUT
          echo "Deploy took ${DEPLOY_DURATION} seconds"
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ !inputs.skip_health_check }}

    steps:
      - name: Wait for application to be ready
        run: sleep 15

      - name: Check API health endpoint
        id: health
        run: |
          MAX_RETRIES=${{ env.HEALTH_CHECK_RETRIES }}
          RETRY_COUNT=0
          HEALTH_URL="${{ secrets.HEALTH_URL }}"

          echo "Checking health endpoint: $HEALTH_URL"
          echo "HEALTH_URL length: ${#HEALTH_URL}"
          echo "DNS lookup:"
          getent hosts "$(echo "$HEALTH_URL" | sed -E 's#https?://([^/]+).*#\1#')" || true
          if [[ "$HEALTH_URL" == http://* ]]; then
            echo "HEALTH_URL uses http://; will try https:// first."
          fi

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES..."

            touch /tmp/health.body
            if [[ "$HEALTH_URL" == http://* ]]; then
              HEALTH_URL_TO_TRY="https://${HEALTH_URL#http://}"
            else
              HEALTH_URL_TO_TRY="$HEALTH_URL"
            fi

            STATUS_CODE=$(curl -sS -L --connect-timeout 5 --max-time 15 -o /tmp/health.body -w "%{http_code}" "$HEALTH_URL_TO_TRY" || true)
            if [[ "$HEALTH_URL" == http://* && "$STATUS_CODE" == "000" ]]; then
              STATUS_CODE=$(curl -sS -L --connect-timeout 5 --max-time 15 -o /tmp/health.body -w "%{http_code}" "$HEALTH_URL" || true)
            fi

            if echo "$STATUS_CODE" | grep -q "^[2][0-9][0-9]$"; then
              echo "Health check passed"
              echo "status=healthy" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Health check failed with status: $STATUS_CODE"
            echo "Response body:"
            cat /tmp/health.body || true

            RETRY_COUNT=$((RETRY_COUNT + 1))

            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Waiting ${{ env.HEALTH_CHECK_INTERVAL }} seconds before retry..."
              sleep ${{ env.HEALTH_CHECK_INTERVAL }}
            fi
          done

          echo "Health check failed after $MAX_RETRIES attempts"
          echo "status=unhealthy" >> $GITHUB_OUTPUT
          exit 1

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.health-check.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=OK" >> $GITHUB_OUTPUT
            echo "color=3066993" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.health-check.result }}" == "failure" ]]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "emoji=FAIL" >> $GITHUB_OUTPUT
            echo "color=15158332" >> $GITHUB_OUTPUT
          else
            echo "status=cancelled" >> $GITHUB_OUTPUT
            echo "emoji=WARN" >> $GITHUB_OUTPUT
            echo "color=16776960" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ steps.status.outputs.status }}
          title: "Backend Deploy - ${{ env.DEPLOY_ENVIRONMENT }}"
          description: |
            **Branch:** ${{ github.event.workflow_run.head_branch || github.ref_name }}
            **Commit:** ${{ github.event.workflow_run.head_sha || github.sha }}
            **Author:** ${{ github.actor }}
            **Deploy Time:** ${{ needs.deploy.outputs.deployment-time }}s
            **Environment:** ${{ env.DEPLOY_ENVIRONMENT }}

            [View Deployment](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: ${{ steps.status.outputs.color }}
          username: "Deploy Bot"
          avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"

  rollback:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: failure() && needs.deploy.result == 'success'

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:dev-ci

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rollback deployment
        run: |
          echo "Starting automatic rollback..."

          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "BACKUP_ID=$BACKUP_ID bash -s" << 'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            LATEST_BACKUP=$(ls -t backups/.env.backend.* 2>/dev/null | head -n1)

            if [ -z "$LATEST_BACKUP" ]; then
              echo "No backup found for rollback"
              exit 1
            fi

            BACKUP_ID=$(echo $LATEST_BACKUP | sed 's/.*\.env.backend\.//')

            echo "Rolling back to backup: $BACKUP_ID"

            if [ -f "backups/${{ env.COMPOSE_FILE }}.$BACKUP_ID" ]; then
              cp "backups/${{ env.COMPOSE_FILE }}.$BACKUP_ID" "${{ env.COMPOSE_FILE }}"
            fi

            if [ -f "backups/.env.backend.$BACKUP_ID" ]; then
              cp "backups/.env.backend.$BACKUP_ID" .env.backend
            fi

            docker compose --env-file .env -f "${{ env.COMPOSE_FILE }}" up -d --force-recreate app

            echo "Rollback completed"
            echo "Please investigate the deployment failure"
          EOF

      - name: Notify rollback
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: "failure"
          title: "Automatic Rollback Executed"
          description: |
            Deployment failed health check and was automatically rolled back.

            **Branch:** ${{ github.event.workflow_run.head_branch || github.ref_name }}
            **Commit:** ${{ github.event.workflow_run.head_sha || github.sha }}

            Please investigate the issue before attempting another deployment.
          color: 16776960
          username: "Deploy Bot"
